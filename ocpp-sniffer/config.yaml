name: OCPP Sniffer
version: '0.3.8'
slug: ocpp-sniffer
description: 'Transparent OCPP proxy that forwards charger traffic to your CPO and captures RFID idTags for EVCC vehicle identification'
homeassistant_api: false
init: false
arch:
  - amd64
  - armv7
  - aarch64
  - armhf
startup: services
boot: auto
options:
  upstream_url: ''
  charger_password: ''
  min_current: 6
  auto_throttle: true
schema:
  upstream_url: str
  charger_password: str?
  min_current: "int?"
  auto_throttle: "bool?"
